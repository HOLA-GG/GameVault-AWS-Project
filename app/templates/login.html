{% extends "base.html" %}

{% block title %}GameVault - Iniciar sesión{% endblock %}

{% block content %}
<div class="nav-bar">
    <div class="nav-links">
        <a href="{{ url_for('main.landing') }}" class="btn btn-secondary">Inicio</a>
        <a href="{{ url_for('main.demo') }}" class="btn btn-secondary">Demo</a>
    </div>
    <div class="nav-links">
        <span style="color:var(--text-secondary);">¿Aún no tienes cuenta?</span>
        <a href="{{ url_for('main.registro') }}" class="btn btn-primary">Registrarme</a>
    </div>
</div>

<section class="section centered">
    <h2>Iniciar sesión</h2>
    <p>Accede a tu panel privado y sigue construyendo tu colección.</p>

    <form action="{{ url_for('main.login') }}" method="POST">
        <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" name="email" placeholder="coleccionista@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" placeholder="Tu contraseña" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-submit" style="width:100%;">Entrar</button>
    </form>

    <div class="auth-toggle">
        <p>¿Olvidaste tu contraseña?</p>
        <a href="{{ url_for('main.forgot_password') }}">Recuperar acceso</a>
    </div>
</section>
{% endblock %}
