{% extends "base.html" %}

{% block title %}GameVault - Recuperar contraseña{% endblock %}

{% block content %}
<div class="nav-bar">
    <div class="nav-links">
        <a href="{{ url_for('main.landing') }}" class="btn btn-secondary">Inicio</a>
        <a href="{{ url_for('main.login') }}" class="btn btn-secondary">Login</a>
    </div>
</div>

<section class="section centered">
    <h2>Recuperar contraseña</h2>
    <p>Te enviaremos un enlace seguro por correo si la cuenta existe.</p>

    <form action="{{ url_for('main.forgot_password') }}" method="POST">
        <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" name="email" required autocomplete="email" placeholder="tu@email.com">
        </div>
        <button type="submit" class="btn-submit" style="width:100%;">Enviar enlace</button>
    </form>

    <div class="auth-toggle">
        <p>¿Tienes un token por soporte o correo?</p>
        <a href="{{ url_for('main.validate_token_page') }}">Validarlo manualmente</a>
    </div>
</section>
{% endblock %}
