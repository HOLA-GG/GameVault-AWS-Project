{% extends "base.html" %}

{% block title %}GameVault - Validar token{% endblock %}

{% block content %}
<section class="section centered">
    <h2>Validar token</h2>
    <p>Usa esta opción solo si recibiste un token manual y no un enlace directo.</p>

    <form action="{{ url_for('main.verify_token') }}" method="POST">
        <div class="form-group">
            <label for="token">Token</label>
            <input type="text" id="token" name="token" placeholder="Pega el token aquí" required autocomplete="off">
        </div>
        <button type="submit" class="btn-submit" style="width:100%;">Validar token</button>
    </form>
</section>
{% endblock %}
