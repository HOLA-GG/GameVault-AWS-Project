{% extends "base.html" %}

{% block title %}GameVault - Nueva contraseña{% endblock %}

{% block content %}
<section class="section centered">
    <h2>Crear nueva contraseña</h2>
    <p>Cuenta: <strong>{{ email }}</strong></p>

    <form action="{{ url_for('main.reset_password_with_email', token=token, email=email) }}" method="POST">
        <div class="form-group">
            <label for="password">Nueva contraseña</label>
            <input type="password" id="password" name="password" required autocomplete="new-password" placeholder="Mínimo 8 caracteres">
        </div>
        <div class="form-group">
            <label for="confirm_password">Confirmar contraseña</label>
            <input type="password" id="confirm_password" name="confirm_password" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn-submit" style="width:100%;">Actualizar contraseña</button>
    </form>
</section>
{% endblock %}
