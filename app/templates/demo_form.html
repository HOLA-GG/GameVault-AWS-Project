{% extends "base.html" %}

{% block title %}GameVault - Demo{% endblock %}

{% block content %}
<div class="nav-bar">
    <div class="nav-links">
        <a href="{{ url_for('main.landing') }}" class="btn btn-secondary">Inicio</a>
        <a href="{{ url_for('main.demo') }}" class="btn btn-primary">Demo</a>
    </div>
    <div class="nav-links">
        <a href="{{ url_for('main.login') }}" class="btn btn-secondary">Login</a>
        <a href="{{ url_for('main.registro') }}" class="btn btn-secondary">Crear cuenta</a>
    </div>
</div>

<section class="section">
    <h2>Demo pública</h2>
    <p style="color:var(--text-secondary);margin-bottom:20px;">
        Esta demo procesa la imagen en memoria y no toca la base de datos real.
    </p>
    <form action="{{ url_for('main.demo') }}" method="POST" enctype="multipart/form-data">
        <div class="form-row">
            <div class="form-group">
                <label for="titulo">Título</label>
                <input type="text" id="titulo" name="titulo" required>
            </div>
            <div class="form-group">
                <label for="imagen">Imagen</label>
                <input type="file" id="imagen" name="imagen" accept="image/*" required>
            </div>
        </div>
        <button type="submit" class="btn-submit">Procesar demo</button>
    </form>
</section>
{% endblock %}
